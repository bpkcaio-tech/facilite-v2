<!-- ═══════════════════════════════════════════════════ -->
<!--  FACILITE — ASSINATURAS                           -->
<!-- ═══════════════════════════════════════════════════ -->

<section class="page-assinaturas">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
    <div>
      <div style="font-size:11px;color:#4B5563;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Total mensal em assinaturas</div>
      <div style="font-size:28px;font-weight:700;color:#EF4444;font-family:'Sora',sans-serif" id="subs-total">R$ 0,00</div>
    </div>
    <button onclick="AssinaturasPage.abrirModalNova()" class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nova assinatura
    </button>
  </div>

  <!-- Assinaturas ativas -->
  <div id="subs-ativas-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:28px"></div>

  <div id="subs-empty" style="display:none;text-align:center;padding:60px 20px">
    <span style="font-size:48px;display:block;margin-bottom:12px">📱</span>
    <p style="color:#6B7280;font-size:14px;margin:0">Nenhuma assinatura cadastrada.</p>
  </div>

</section>

<!-- ══════════ Modal nova assinatura ══════════ -->
<div id="modal-assinatura" class="modal-overlay">
  <div class="modal-box" style="width:520px">
    <h3 class="modal-title" id="modal-sub-title">Nova Assinatura</h3>

    <!-- Passo 1: escolher preset -->
    <div id="sub-step-1">
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <button type="button" class="sub-cat-btn sub-cat-btn--active" onclick="AssinaturasPage.filtrarPresets('todos')">Todos</button>
        <button type="button" class="sub-cat-btn" onclick="AssinaturasPage.filtrarPresets('Streaming')">🎬 Streaming</button>
        <button type="button" class="sub-cat-btn" onclick="AssinaturasPage.filtrarPresets('Música')">🎵 Música</button>
        <button type="button" class="sub-cat-btn" onclick="AssinaturasPage.filtrarPresets('Cloud')">☁️ Cloud</button>
        <button type="button" class="sub-cat-btn" onclick="AssinaturasPage.filtrarPresets('IA')">🤖 IA</button>
        <button type="button" class="sub-cat-btn" onclick="AssinaturasPage.filtrarPresets('Saúde')">💪 Saúde</button>
        <button type="button" class="sub-cat-btn" onclick="AssinaturasPage.filtrarPresets('Trabalho')">📊 Trabalho</button>
      </div>
      <div id="sub-preset-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;max-height:320px;overflow-y:auto;padding:2px"></div>
    </div>

    <!-- Passo 2: configurar valor e dia -->
    <div id="sub-step-2" style="display:none">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:12px" id="sub-preview"></div>

      <div id="sub-custom-fields" style="display:none;margin-bottom:14px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
          <div>
            <label class="form-label">Nome</label>
            <input id="sub-custom-nome" type="text" placeholder="Nome do serviço" class="form-input">
          </div>
          <div>
            <label class="form-label">Emoji</label>
            <input id="sub-custom-emoji" type="text" placeholder="📱" maxlength="2" class="form-input" style="text-align:center;font-size:20px">
          </div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
        <div>
          <label class="form-label">Valor mensal (R$)</label>
          <input id="sub-valor" type="text" inputmode="decimal" placeholder="29,90" class="form-input">
        </div>
        <div>
          <label class="form-label">Dia do vencimento</label>
          <input id="sub-dia" type="number" min="1" max="31" placeholder="5" class="form-input">
        </div>
      </div>

      <div style="display:flex;gap:10px">
        <button type="button" onclick="AssinaturasPage.voltarPasso1()" class="btn-modal-cancel">← Voltar</button>
        <button type="button" onclick="AssinaturasPage.salvar()" class="btn-modal-save">Adicionar</button>
      </div>
    </div>
  </div>
</div>

<style>
  .sub-cat-btn{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);padding:6px 12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;color:#6B7280;cursor:pointer;transition:all 0.12s;white-space:nowrap}
  .sub-cat-btn:hover{border-color:rgba(255,255,255,0.12);color:#D1D5DB}
  .sub-cat-btn--active{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.25);color:#22C55E}

  .sub-preset-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:12px;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif}
  .sub-preset-card:hover{border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.04);transform:translateY(-1px)}
  .sub-preset-card__emoji{font-size:24px}
  .sub-preset-card__nome{font-size:12px;color:#D1D5DB;font-weight:500;text-align:center}

  .sub-card{background:rgba(15,26,18,0.6);border:1px solid rgba(255,255,255,0.04);border-radius:14px;padding:18px;position:relative;transition:border-color 0.15s}
  .sub-card:hover{border-color:rgba(255,255,255,0.08)}
  .sub-card__header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .sub-card__icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .sub-card__info{flex:1}
  .sub-card__nome{font-size:14px;font-weight:600;color:#F0FDF4}
  .sub-card__cat{font-size:11px;color:#4B5563;margin-top:2px}
  .sub-card__valor{font-family:'Sora',sans-serif;font-weight:700;font-size:16px;color:#F0FDF4}
  .sub-card__dia{font-size:12px;color:#6B7280;margin-top:2px}
  .sub-card__actions{position:absolute;top:12px;right:12px;display:flex;gap:4px;opacity:0;transition:opacity 0.15s}
  .sub-card:hover .sub-card__actions{opacity:1}
</style>
