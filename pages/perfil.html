<!-- ═══════════════════════════════════════════════════ -->
<!--  FACILITE — PERFIL COMPLETO                       -->
<!-- ═══════════════════════════════════════════════════ -->

<section class="page-perfil perfil-container">

  <!-- ── Avatar + Nome + Plano ─────────────────────── -->
  <div class="card" style="padding:28px;margin-bottom:20px;text-align:center;position:relative">
    <div style="position:relative;display:inline-block;cursor:pointer" onclick="PerfilPage.abrirUploadFoto()">
      <div id="perfil-avatar" style="width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,#22C55E,#16A34A);display:flex;align-items:center;justify-content:center;font-size:34px;color:#000;font-family:'Sora',sans-serif;font-weight:700;margin:0 auto;overflow:hidden">
        <span id="perfil-avatar-letra">F</span>
        <img id="perfil-avatar-img" style="width:100%;height:100%;object-fit:cover;display:none" alt="">
      </div>
      <div style="position:absolute;bottom:0;right:-2px;width:28px;height:28px;border-radius:50%;background:#22C55E;border:2px solid var(--bg-card,#0F1A12);display:flex;align-items:center;justify-content:center">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
    </div>
    <input type="file" id="perfil-foto-input" accept="image/*" style="display:none" onchange="PerfilPage.processarFoto(this)">
    <div style="font-family:'Sora',sans-serif;font-size:20px;font-weight:700;color:#F0FDF4;margin-top:14px" id="perfil-nome-display">Felipe</div>
    <div style="font-size:13px;color:#6B7280;margin-top:4px" id="perfil-plano-display">Plano Gratuito</div>
  </div>

  <!-- ── Dados pessoais ────────────────────────────── -->
  <div class="card" style="padding:24px;margin-bottom:20px">
    <h3 class="modal-title" style="margin-bottom:18px;font-size:15px">Dados pessoais</h3>

    <label class="form-label">Nome completo</label>
    <input id="perfil-nome" type="text" class="form-input" style="margin-bottom:12px">

    <label class="form-label">Email</label>
    <input id="perfil-email" type="email" placeholder="seuemail@exemplo.com" class="form-input" style="margin-bottom:16px">

    <button type="button" onclick="PerfilPage.salvar()" class="btn-modal-save" style="width:100%">
      Salvar alterações
    </button>
  </div>

  <!-- ── Alterar senha ─────────────────────────────── -->
  <div class="card" style="padding:24px;margin-bottom:20px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 class="modal-title" style="margin:0;font-size:15px">Senha</h3>
      <button type="button" onclick="PerfilPage.toggleSenha()" id="btn-toggle-senha" style="background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:8px;color:#22C55E;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:6px 14px;cursor:pointer;transition:all 0.15s">
        Alterar senha
      </button>
    </div>

    <div id="perfil-senha-form" style="display:none">
      <label class="form-label">Senha atual</label>
      <div style="position:relative;margin-bottom:10px">
        <input id="perfil-senha-atual" type="password" placeholder="••••••" class="form-input" style="padding-right:40px">
        <button type="button" onclick="PerfilPage.toggleVer('perfil-senha-atual')" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:#4B5563">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <label class="form-label">Nova senha</label>
      <input id="perfil-senha-nova" type="password" placeholder="Mínimo 6 caracteres" class="form-input" style="margin-bottom:10px">

      <label class="form-label">Confirmar nova senha</label>
      <input id="perfil-senha-confirmar" type="password" placeholder="Repita a nova senha" class="form-input" style="margin-bottom:14px">

      <button type="button" onclick="PerfilPage.salvarSenha()" class="btn-modal-save" style="width:100%">
        Salvar nova senha
      </button>
    </div>
  </div>

  <!-- ── Configurações ──────────────────────────────── -->
  <div class="card" style="padding:24px;margin-bottom:20px">
    <h3 class="modal-title" style="margin-bottom:18px;font-size:15px">Configurações</h3>

    <!-- Tema -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:12px 0;border-bottom:1px solid var(--border-card)">
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--text-primary)">Aparência</div>
        <div style="font-size:12px;color:var(--text-secondary)">Escolha o tema da plataforma</div>
      </div>
      <div style="display:flex;gap:6px" id="tema-toggle">
        <button type="button" onclick="PerfilPage.setTema('dark')" id="btn-tema-dark" class="toggle-btn toggle-btn--small" style="flex:none;gap:4px;display:flex;align-items:center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg> Escuro
        </button>
        <button type="button" onclick="PerfilPage.setTema('light')" id="btn-tema-light" class="toggle-btn toggle-btn--small" style="flex:none;gap:4px;display:flex;align-items:center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg> Claro
        </button>
      </div>
    </div>

    <!-- Dia pagamento -->
    <label class="form-label">Dia preferido para pagamentos</label>
    <input id="perfil-dia-pgto" type="number" min="1" max="31" class="form-input" style="margin-bottom:14px">

    <button type="button" onclick="PerfilPage.salvarPrefs()" style="width:100%;padding:12px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:10px;color:#22C55E;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.15s" onmouseover="this.style.background='rgba(34,197,94,0.15)'" onmouseout="this.style.background='rgba(34,197,94,0.08)'">
      Salvar preferências
    </button>
  </div>

  <!-- ── Plano ────────────────────────────────────── -->
  <div class="card" style="padding:24px;margin-bottom:20px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <h3 class="modal-title" style="margin:0 0 4px;font-size:15px">Seu plano</h3>
        <div style="font-size:13px;color:#6B7280" id="perfil-plano-info">Gratuito</div>
      </div>
      <button onclick="FacilitePaywall.abrir()" id="perfil-btn-upgrade" class="btn-primary" style="font-size:13px;padding:8px 20px">Fazer upgrade</button>
    </div>
  </div>

  <!-- ── Ações rápidas ─────────────────────────────── -->
  <div style="display:flex;gap:12px;margin-bottom:20px">
    <a href="index.html" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;color:#D1D5DB;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;text-decoration:none;transition:all 0.15s" onmouseover="this.style.borderColor='rgba(34,197,94,0.2)';this.style.color='#22C55E'" onmouseout="this.style.borderColor='rgba(255,255,255,0.06)';this.style.color='#D1D5DB'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Página Inicial
    </a>
    <button type="button" onclick="PerfilPage.logout()" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);border-radius:12px;color:#EF4444;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s" onmouseover="this.style.background='rgba(239,68,68,0.12)'" onmouseout="this.style.background='rgba(239,68,68,0.06)'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sair da conta
    </button>
  </div>

  <!-- ── Zona de perigo ────────────────────────────── -->
  <div class="card" style="padding:24px;border-color:rgba(239,68,68,0.12)">
    <h3 style="font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#EF4444;margin:0 0 12px">Zona de perigo</h3>
    <p style="font-size:13px;color:#6B7280;margin:0 0 16px">Apagar todos os dados e restaurar valores padrão. Esta ação é irreversível.</p>
    <button type="button" onclick="PerfilPage.resetDados()" style="padding:10px 20px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:10px;color:#EF4444;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.15s" onmouseover="this.style.background='rgba(239,68,68,0.16)'" onmouseout="this.style.background='rgba(239,68,68,0.08)'">
      Resetar todos os dados
    </button>
  </div>

</section>
