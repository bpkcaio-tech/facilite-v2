<!--  FACILITE — RELATÓRIOS                            -->
<!-- ═══════════════════════════════════════════════════ -->

<section class="page-relatorios">

  <!-- Navegação de meses -->
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:24px">
    <div style="display:flex;align-items:center;gap:14px">
      <button onclick="RelatoriosPage.mesAnterior()" class="mes-nav-btn" title="Mês anterior">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span style="font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#F0FDF4;min-width:120px;text-align:center" id="rel-mes-label"></span>
      <button onclick="RelatoriosPage.mesProximo()" class="mes-nav-btn" title="Próximo mês">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="rel-badge-tipo" style="font-size:11px;padding:4px 12px;border-radius:6px;font-weight:600"></span>
    </div>
  </div>

  <!-- Resumo financeiro -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:28px">
    <div class="card" style="padding:20px">
      <div style="font-size:12px;color:#6B7280;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Receita total</div>
      <div style="font-size:24px;font-weight:700;color:#22C55E;font-family:'Sora',sans-serif" id="rel-receita">R$ 0,00</div>
    </div>
    <div class="card" style="padding:20px">
      <div style="font-size:12px;color:#6B7280;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Despesa total</div>
      <div style="font-size:24px;font-weight:700;color:#EF4444;font-family:'Sora',sans-serif" id="rel-despesa">R$ 0,00</div>
    </div>
    <div class="card" style="padding:20px">
      <div style="font-size:12px;color:#6B7280;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Saldo do mês</div>
      <div style="font-size:24px;font-weight:700;font-family:'Sora',sans-serif" id="rel-saldo">R$ 0,00</div>
    </div>
    <div class="card" style="padding:20px">
      <div style="font-size:12px;color:#6B7280;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Economia</div>
      <div style="font-size:24px;font-weight:700;font-family:'Sora',sans-serif" id="rel-economia">0%</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px" class="rel-grid-2col">
    <!-- Gastos por categoria -->
    <div class="card" style="padding:20px">
      <h3 style="font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#F0FDF4;margin:0 0 20px">Gastos por categoria</h3>
      <div id="rel-categorias"></div>
    </div>

    <!-- Top gastos -->
    <div class="card" style="padding:20px">
      <h3 style="font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#F0FDF4;margin:0 0 20px">Maiores gastos</h3>
      <div id="rel-top-gastos"></div>
    </div>
  </div>

  <!-- Fixos vs Variáveis -->
  <div class="card" style="padding:20px;margin-bottom:28px">
    <h3 style="font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#F0FDF4;margin:0 0 20px">Fixos vs Variáveis</h3>
    <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap" id="rel-fixo-var"></div>
  </div>

  <!-- Dicas -->
  <div class="card" style="padding:20px;margin-bottom:28px">
    <h3 style="font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#F0FDF4;margin:0 0 16px">Insights do mês</h3>
    <div id="rel-insights" style="display:flex;flex-direction:column;gap:10px"></div>
  </div>

  <!-- Relatórios salvos -->
  <div class="card" style="padding:20px">
    <h3 style="font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#F0FDF4;margin:0 0 16px">Relatórios anteriores</h3>
    <div id="rel-salvos"></div>
  </div>

</section>

<style>
  .rel-bar-wrap{margin-bottom:14px}
  .rel-bar-header{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
  .rel-bar-label{color:#D1D5DB;font-weight:500}
  .rel-bar-value{color:#9CA3AF;font-weight:600}
  .rel-bar-track{height:8px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden}
  .rel-bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease}
  .rel-insight{background:rgba(34,197,94,0.04);border:1px solid rgba(34,197,94,0.1);border-radius:10px;padding:14px 16px;font-size:13px;color:#D1D5DB;line-height:1.5}
  .rel-mes-card{padding:12px 16px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.15s}
  .rel-mes-card:hover{border-color:rgba(34,197,94,0.2);background:rgba(34,197,94,0.03)}
  @media(max-width:768px){.rel-grid-2col{grid-template-columns:1fr !important}}
</style>
