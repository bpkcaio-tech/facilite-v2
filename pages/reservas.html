<!-- ═══════════════════════════════════════════════════ -->
<!--  FACILITE — RESERVAS FINANCEIRAS                  -->
<!-- ═══════════════════════════════════════════════════ -->

<section class="page-reservas">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:24px">
    <div>
      <div style="font-size:11px;color:#4B5563;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Total guardado</div>
      <div style="font-size:28px;font-weight:700;color:#22C55E;font-family:'Sora',sans-serif" id="reservas-total-guardado">R$ 0,00</div>
      <div style="font-size:13px;color:#6B7280;margin-top:2px" id="reservas-total-meta">de R$ 0,00 em metas</div>
    </div>
    <button onclick="ReservasPage.abrirModal()" class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nova reserva
    </button>
  </div>

  <!-- Resumo cards -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px">
    <div class="card" style="padding:16px;display:flex;align-items:center;gap:12px">
      <div style="width:38px;height:38px;border-radius:10px;background:rgba(34,197,94,0.1);display:flex;align-items:center;justify-content:center;font-size:16px">🎯</div>
      <div>
        <div style="font-size:11px;color:#4B5563;text-transform:uppercase;letter-spacing:0.5px">Metas ativas</div>
        <div style="font-size:17px;font-weight:700;color:#F0FDF4;font-family:'Sora',sans-serif" id="reservas-count">0</div>
      </div>
    </div>
    <div class="card" style="padding:16px;display:flex;align-items:center;gap:12px">
      <div style="width:38px;height:38px;border-radius:10px;background:rgba(59,130,246,0.1);display:flex;align-items:center;justify-content:center;font-size:16px">📊</div>
      <div>
        <div style="font-size:11px;color:#4B5563;text-transform:uppercase;letter-spacing:0.5px">Progresso geral</div>
        <div style="font-size:17px;font-weight:700;font-family:'Sora',sans-serif" id="reservas-pct-geral" style="color:#3B82F6">0%</div>
      </div>
    </div>
    <div class="card" style="padding:16px;display:flex;align-items:center;gap:12px">
      <div style="width:38px;height:38px;border-radius:10px;background:rgba(139,92,246,0.1);display:flex;align-items:center;justify-content:center;font-size:16px">🏆</div>
      <div>
        <div style="font-size:11px;color:#4B5563;text-transform:uppercase;letter-spacing:0.5px">Completas</div>
        <div style="font-size:17px;font-weight:700;color:#22C55E;font-family:'Sora',sans-serif" id="reservas-completas">0</div>
      </div>
    </div>
  </div>

  <!-- Lista de reservas -->
  <div id="reservas-lista" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px"></div>

  <div id="reservas-empty" style="display:none;text-align:center;padding:60px 20px">
    <span style="font-size:56px;display:block;margin-bottom:14px">🎯</span>
    <h3 style="font-family:'Sora',sans-serif;font-size:16px;font-weight:600;color:#F0FDF4;margin:0 0 6px">Comece a guardar dinheiro</h3>
    <p style="color:#6B7280;font-size:14px;margin:0 0 16px">Crie reservas para viagens, compras, emergências ou qualquer objetivo.</p>
    <button onclick="ReservasPage.abrirModal()" class="btn-primary">+ Criar primeira reserva</button>
  </div>

</section>

<!-- ══════════ Modal nova reserva ══════════ -->
<div id="modal-reserva" class="modal-overlay">
  <div class="modal-box" style="width:420px">
    <h3 class="modal-title" id="modal-reserva-title">Nova Reserva</h3>

    <!-- Ícone + cor -->
    <div style="display:flex;gap:14px;align-items:center;margin-bottom:18px;padding:16px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:12px">
      <button type="button" onclick="ReservasPage.abrirEmojiPicker()" id="reserva-icone-btn" style="width:52px;height:52px;border-radius:14px;border:1px dashed rgba(255,255,255,0.12);background:rgba(34,197,94,0.08);cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;transition:all 0.15s" title="Escolher ícone">🎯</button>
      <div style="flex:1">
        <label class="form-label" style="margin-bottom:4px">Nome da reserva</label>
        <input id="reserva-nome" type="text" placeholder="Ex: Viagem, iPhone, Emergência..." class="form-input">
      </div>
    </div>

    <!-- Categoria -->
    <label class="form-label">Categoria</label>
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap" id="reserva-cats">
      <button type="button" class="toggle-btn toggle-btn--small" data-cat="Emergência" onclick="ReservasPage.setCat('Emergência')">🛡️ Emergência</button>
      <button type="button" class="toggle-btn toggle-btn--small" data-cat="Viagem" onclick="ReservasPage.setCat('Viagem')">✈️ Viagem</button>
      <button type="button" class="toggle-btn toggle-btn--small" data-cat="Compra" onclick="ReservasPage.setCat('Compra')">🛒 Compra</button>
      <button type="button" class="toggle-btn toggle-btn--small" data-cat="Investimento" onclick="ReservasPage.setCat('Investimento')">📈 Investimento</button>
      <button type="button" class="toggle-btn toggle-btn--small" data-cat="Educação" onclick="ReservasPage.setCat('Educação')">📚 Educação</button>
      <button type="button" class="toggle-btn toggle-btn--small" data-cat="Outros" onclick="ReservasPage.setCat('Outros')">📦 Outros</button>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div>
        <label class="form-label">Meta (R$)</label>
        <input id="reserva-meta" type="text" inputmode="decimal" placeholder="5.000,00" class="form-input">
      </div>
      <div>
        <label class="form-label">Já guardado (R$)</label>
        <input id="reserva-atual" type="text" inputmode="decimal" placeholder="0,00" class="form-input">
      </div>
    </div>

    <label class="form-label">Prazo (opcional)</label>
    <div style="position:relative;margin-bottom:14px" id="reserva-prazo-wrap">
      <input id="reserva-prazo" type="text" class="form-input" style="padding-right:36px" placeholder="DD/MM/AAAA" maxlength="10"
        oninput="ReservasPage.onPrazoInput(this)"
      >
      <button type="button" onclick="ReservasPage.abrirDatePicker()" style="position:absolute;right:2px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:8px;border-radius:6px;display:flex;align-items:center" onmouseover="this.querySelector('svg').style.stroke='#22C55E'" onmouseout="this.querySelector('svg').style.stroke='#4B5563'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4B5563" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </button>
      <div id="reserva-datepicker" class="datepicker" style="display:none"></div>
    </div>

    <!-- Cor -->
    <label class="form-label">Cor</label>
    <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap" id="reserva-cores">
      <button type="button" onclick="ReservasPage.setCor('#22C55E')" class="cor-btn cor-btn--active" style="background:#22C55E"></button>
      <button type="button" onclick="ReservasPage.setCor('#3B82F6')" class="cor-btn" style="background:#3B82F6"></button>
      <button type="button" onclick="ReservasPage.setCor('#8B5CF6')" class="cor-btn" style="background:#8B5CF6"></button>
      <button type="button" onclick="ReservasPage.setCor('#F59E0B')" class="cor-btn" style="background:#F59E0B"></button>
      <button type="button" onclick="ReservasPage.setCor('#EF4444')" class="cor-btn" style="background:#EF4444"></button>
      <button type="button" onclick="ReservasPage.setCor('#EC4899')" class="cor-btn" style="background:#EC4899"></button>
      <button type="button" onclick="ReservasPage.setCor('#06B6D4')" class="cor-btn" style="background:#06B6D4"></button>
      <button type="button" onclick="ReservasPage.setCor('#F97316')" class="cor-btn" style="background:#F97316"></button>
    </div>

    <div style="display:flex;gap:10px">
      <button type="button" onclick="ReservasPage.fecharModal()" class="btn-modal-cancel">Cancelar</button>
      <button type="button" onclick="ReservasPage.salvar()" class="btn-modal-save">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal adicionar/retirar valor -->
<div id="modal-reserva-valor" class="modal-overlay">
  <div class="modal-box" style="width:340px">
    <h3 class="modal-title" id="modal-rv-title">Guardar dinheiro</h3>
    <div id="modal-rv-info" style="margin-bottom:16px"></div>

    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button type="button" onclick="ReservasPage.setTipoValor('guardar')" id="btn-rv-guardar" class="toggle-btn toggle-btn--pos toggle-btn--active">💰 Guardar</button>
      <button type="button" onclick="ReservasPage.setTipoValor('retirar')" id="btn-rv-retirar" class="toggle-btn toggle-btn--neg">📤 Retirar</button>
    </div>

    <label class="form-label">Valor (R$)</label>
    <input id="rv-valor" type="text" inputmode="decimal" placeholder="100,00" class="form-input" style="margin-bottom:20px">

    <div style="display:flex;gap:10px">
      <button type="button" onclick="document.getElementById('modal-reserva-valor').style.display='none'" class="btn-modal-cancel">Cancelar</button>
      <button type="button" onclick="ReservasPage.confirmarValor()" class="btn-modal-save">Confirmar</button>
    </div>
  </div>
</div>

<!-- Estilos movidos para dashboard.css (global) -->
