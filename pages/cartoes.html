<!-- ═══════════════════════════════════════════════════ -->
<!--  FACILITE — CARTÕES DE CRÉDITO                    -->
<!-- ═══════════════════════════════════════════════════ -->

<section class="page-cartoes">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
    <div>
      <div style="font-size:11px;color:#4B5563;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Limite total disponível</div>
      <div style="font-size:28px;font-weight:700;color:#22C55E;font-family:'Sora',sans-serif" id="cartoes-limite-total">R$ 0,00</div>
    </div>
    <button onclick="CartoesPage.abrirModal()" class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Novo cartão
    </button>
  </div>

  <div id="lista-cartoes" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px"></div>

  <div id="empty-cartoes" style="display:none;text-align:center;padding:60px 20px">
    <span style="font-size:48px;display:block;margin-bottom:12px">💳</span>
    <p style="color:#6B7280;font-size:14px;margin:0 0 8px">Nenhum cartão cadastrado.</p>
    <p style="color:#374151;font-size:13px;margin:0">Clique em <strong style="color:#22C55E">+ Novo cartão</strong> para adicionar.</p>
  </div>

</section>

<!-- ══════════ Modal cartão ══════════ -->
<div id="modal-cartao" class="modal-overlay">
  <div class="modal-box" style="width:420px">
    <h3 class="modal-title" id="modal-cartao-title">Novo Cartão</h3>

    <label class="form-label">Nome do banco</label>
    <input id="cartao-nome" type="text" placeholder="Ex: Nubank, Inter, C6..." class="form-input" style="margin-bottom:14px">

    <!-- Bandeira -->
    <label class="form-label">Bandeira</label>
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap" id="bandeira-group">
      <button type="button" onclick="CartoesPage.setBandeira('visa')" class="bandeira-btn" data-b="visa">
        <span style="font-weight:800;font-style:italic;letter-spacing:-0.5px;color:#1A1F71">VISA</span>
      </button>
      <button type="button" onclick="CartoesPage.setBandeira('mastercard')" class="bandeira-btn bandeira-btn--active" data-b="mastercard">
        <span style="display:flex;align-items:center;gap:2px"><span style="width:10px;height:10px;border-radius:50%;background:#EB001B"></span><span style="width:10px;height:10px;border-radius:50%;background:#F79E1B;margin-left:-4px"></span></span>
      </button>
      <button type="button" onclick="CartoesPage.setBandeira('elo')" class="bandeira-btn" data-b="elo">
        <span style="font-weight:700;color:#00A4E0;font-size:11px">ELO</span>
      </button>
      <button type="button" onclick="CartoesPage.setBandeira('amex')" class="bandeira-btn" data-b="amex">
        <span style="font-weight:700;color:#006FCF;font-size:10px">AMEX</span>
      </button>
      <button type="button" onclick="CartoesPage.setBandeira('outro')" class="bandeira-btn" data-b="outro">
        <span style="font-size:11px;color:#6B7280">Outro</span>
      </button>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div>
        <label class="form-label">Número final (4 dígitos)</label>
        <input id="cartao-final" type="text" maxlength="4" placeholder="8817" class="form-input" oninput="this.value=this.value.replace(/\D/g,'')">
      </div>
      <div>
        <label class="form-label">Nome do titular</label>
        <input id="cartao-titular" type="text" placeholder="FELIPE" class="form-input" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div>
        <label class="form-label">Limite total (R$)</label>
        <input id="cartao-limite" type="text" inputmode="decimal" placeholder="5.000,00" class="form-input">
      </div>
      <div>
        <label class="form-label">Dia vencimento fatura</label>
        <input id="cartao-venc-fatura" type="number" min="1" max="31" placeholder="11" class="form-input">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div>
        <label class="form-label">Validade do cartão</label>
        <input id="cartao-validade" type="text" maxlength="5" placeholder="08/29" class="form-input" oninput="CartoesPage.formatarValidade(this)">
      </div>
      <div>
        <label class="form-label">Limite disponível (R$)</label>
        <input id="cartao-disponivel" type="text" inputmode="decimal" placeholder="5.000,00" class="form-input">
      </div>
    </div>

    <!-- Cor -->
    <label class="form-label">Cor do cartão</label>
    <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap" id="cartao-cores">
      <button type="button" onclick="CartoesPage.setCor('#FF7A00')" class="cor-btn" style="background:#FF7A00" title="Inter"></button>
      <button type="button" onclick="CartoesPage.setCor('#820AD1')" class="cor-btn cor-btn--active" style="background:#820AD1" title="Nubank"></button>
      <button type="button" onclick="CartoesPage.setCor('#1A1A2E')" class="cor-btn" style="background:#1A1A2E" title="C6"></button>
      <button type="button" onclick="CartoesPage.setCor('#003641')" class="cor-btn" style="background:#003641" title="Sicredi"></button>
      <button type="button" onclick="CartoesPage.setCor('#0066CC')" class="cor-btn" style="background:#0066CC" title="Caixa"></button>
      <button type="button" onclick="CartoesPage.setCor('#EC0000')" class="cor-btn" style="background:#EC0000" title="Santander"></button>
      <button type="button" onclick="CartoesPage.setCor('#00A651')" class="cor-btn" style="background:#00A651" title="Sicoob"></button>
      <button type="button" onclick="CartoesPage.setCor('#FFD700')" class="cor-btn" style="background:#FFD700" title="Ourocard"></button>
    </div>

    <div style="display:flex;gap:10px">
      <button type="button" onclick="CartoesPage.fecharModal()" class="btn-modal-cancel">Cancelar</button>
      <button type="button" onclick="CartoesPage.salvar()" class="btn-modal-save">Salvar</button>
    </div>
  </div>
</div>

<style>
  .bandeira-btn{width:56px;height:38px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
  .bandeira-btn:hover{border-color:rgba(255,255,255,0.15)}
  .bandeira-btn--active{border-color:rgba(34,197,94,0.4);background:rgba(34,197,94,0.06);box-shadow:0 0 0 2px rgba(34,197,94,0.1)}

  .cor-btn{width:34px;height:34px;border-radius:10px;border:2px solid transparent;cursor:pointer;transition:all 0.15s;flex-shrink:0}
  .cor-btn:hover{transform:scale(1.1)}
  .cor-btn--active{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,0.1)}

  .cc-visual{aspect-ratio:1.586;border-radius:16px;padding:22px 24px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,0.35)}
  .cc-visual::after{content:'';position:absolute;top:-30%;right:-20%;width:60%;height:120%;background:rgba(255,255,255,0.04);border-radius:50%;transform:rotate(-15deg)}
  .cc-visual__chip{width:36px;height:26px;border-radius:5px;background:linear-gradient(135deg,#D4AF37,#F5D060);opacity:0.8}
  .cc-visual__nome{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.3);margin-top:8px}
  .cc-visual__numero{font-family:'Sora',sans-serif;font-size:14px;color:rgba(255,255,255,0.65);letter-spacing:3px;margin-top:4px}
  .cc-visual__bottom{display:flex;justify-content:space-between;align-items:flex-end}
  .cc-visual__titular{font-size:11px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1.5px}
  .cc-visual__validade{font-size:11px;color:rgba(255,255,255,0.45)}
  .cc-visual__bandeira{font-size:12px;font-weight:700;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:1px}
  .cc-info{margin-top:16px;background:rgba(15,26,18,0.6);border:1px solid rgba(255,255,255,0.04);border-radius:12px;padding:14px 16px}
  .cc-info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px}
  .cc-info-row:not(:last-child){border-bottom:1px solid rgba(255,255,255,0.025)}
  .cc-info-label{color:#4B5563}
  .cc-info-val{color:#D1D5DB;font-weight:600;font-family:'DM Sans',sans-serif}
  .cc-card-wrap{position:relative}
  .cc-card-actions{position:absolute;top:12px;right:12px;z-index:2;display:flex;gap:4px;opacity:0;transition:opacity 0.15s}
  .cc-card-wrap:hover .cc-card-actions{opacity:1}
  .cc-act{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);transition:background 0.12s}
  .cc-act:hover{background:rgba(0,0,0,0.7)}
</style>
